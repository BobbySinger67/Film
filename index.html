<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobbyFlix</title>
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
        }

        a {
            color: #fff;
            text-decoration: none;
        }

        /* Cabeçalho (Navbar) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: fixed;
            width: 100%;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            z-index: 1000;
        }

        .logo {
            color: #E50914;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li a:hover {
            color: #b3b3b3;
            transition: 0.3s;
        }

        /* Banner Principal */
        .banner {
            background: linear-gradient(to top, #141414 10%, rgba(0,0,0,0) 60%), 
                        url('Inicial.png') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4%;
        }

        .banner-content {
            max-width: 600px;
        }

        .banner-content h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .banner-content p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #cccccc;
        }

        .btn {
            background-color: #E50914;
            color: white;
            padding: 10px 24px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #b81d24;
        }

        /* Seção de Filmes (Grid) */
        .movies-section {
            padding: 40px 4%;
        }

        .movies-section h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background-color: #2f2f2f;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info span {
            color: #46d369;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 30px;
            color: #808080;
            font-size: 0.9rem;
            border-top: 1px solid #2f2f2f;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BOBBYFLIX</div>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Filmes</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Minha Lista</a></li>
            </ul>
        </nav>
    </header>

 <section class="banner" id="banner-carrossel">
        <div class="banner-content">
            <h1 id="banner-titulo">Carregando...</h1>
            <p id="banner-desc"></p>
            <button class="btn">Assistir Agora</button>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Captura todos os cards de filmes que estão na página
            const cards = document.querySelectorAll('.movie-card');
            const filmesBanner = [];

            // Extrai as informações de cada card automaticamente
            cards.forEach(card => {
                const img = card.querySelector('img').src;
                const titulo = card.querySelector('h3').textContent;
                
                // Como a grade não tem descrição longa, criamos uma padrão ou você pode usar o Span
                const info = card.querySelector('span').textContent; 

                filmesBanner.push({
                    titulo: titulo,
                    descricao: `Disponível agora no CineFlix. ${info}. Clique em assistir para ver mais detalhes sobre este sucesso.`,
                    imagem: img
                });
            });

            let filmeAtual = 0;
            const bannerElement = document.getElementById('banner-carrossel');
            const tituloElement = document.getElementById('banner-titulo');
            const descElement = document.getElementById('banner-desc');

            // Função para atualizar o banner
            function atualizarBanner(index) {
                if (filmesBanner.length === 0) return;
                const filme = filmesBanner[index];
                tituloElement.textContent = filme.titulo;
                descElement.textContent = filme.descricao;
                bannerElement.style.backgroundImage = `linear-gradient(to top, #141414 10%, rgba(0,0,0,0) 60%), url('${filme.imagem}')`;
            }

            // Inicializa o primeiro filme no banner
            atualizarBanner(0);

            // Muda de filme sozinho a cada 5 segundos
            setInterval(() => {
                if (filmesBanner.length > 0) {
                    filmeAtual = (filmeAtual + 1) % filmesBanner.length;
                    atualizarBanner(filmeAtual);
                }
            }, 5000);
        });
    </script>

    <main class="movies-section">
        <h2>Todos os Filmes</h2>
        <div class="movies-grid">
            
            <a href="https://mega.nz/file/W3gXjSDK#OdxPivyzwLICD7JyVc5-eYTDzUV5f0_67s6QgnATwKA" target="_blank">
                <div class="movie-card">
                <img src="Homem de Ferro.jpg" alt="Filme 1">
                <div class="movie-info">
                    <h3>Homem de Ferro</h3>
                </div>
            </div>
 
                <a href="https://mega.nz/file/r7wSBYSZ#p7Qvc8gnYuSj15ZIPBDHfLQHOx7tW2cJgLGqduWyhB4" target="_blank">
            <div class="movie-card">
                <img src="Norbit.jpg" alt="Filme 2">
                <div class="movie-info">
                    <h3> Norbit </h3>
                </div>
            </div>

               <a href="https://mega.nz/file/KzY2VbIY#jnHcIlB1xxNtQi-kAye8EpUmp6cOqL1cMG0ISryoJmY" target="_blank">
            <div class="movie-card">
                <img src="Gente Grande.jpg" alt="Filme 3">
                <div class="movie-info">
                    <h3>Gente Grande</h3>
                </div>
            </div>
               <a href="https://mega.nz/file/KzY2VbIY#jnHcIlB1xxNtQi-kAye8EpUmp6cOqL1cMG0ISryoJmY" target="_blank">
            <div class="movie-card">
                <img src="O Poderoso Chefão.jpg" alt="Filme 4">
                <div class="movie-info">
                    <h3>O Poderoso Chefão</h3>
                </div>
            </div>

                <a href="https://mega.nz/file/2vR2WYxB#Z_Dj5EhD8cuz1WuaBNDADTaLXXcpVEShRlfduB4HyhQ" target="_blank">
            <div class="movie-card">
                <img src="Os Bad Boys.jpg" alt="Filme 5">
                <div class="movie-info">
                    <h3>Os Bad Boys</h3>
                </div>
           </div>

                    <a href="https://mega.nz/file/KzY2VbIY#jnHcIlB1xxNtQi-kAye8EpUmp6cOqL1cMG0ISryoJmY" target="_blank">
            <div class="movie-card">
                <img src="John Wick 4.jpg" alt="Filme 6">
                <div class="movie-info">
                    <h3>John Winck 4</h3>
                </div>
           </div>
        
       </div>
    </main>

    <footer>
        <p>BobbyFlix.</p>
    </footer>

</body>
</html>
